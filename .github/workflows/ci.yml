name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "dev/v*"
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev]"

      - name: Validate version format
        run: python .github/scripts/validate_version.py

      - name: Run tests
        run: python -m pytest tests/ -v

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate version format
        run: python .github/scripts/validate_version.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install dist/*.whl --no-deps
          python -c "import torchextractx; from torchextractx import ExtraContext; print(torchextractx.__version__); print(ExtraContext)"
